name: Windows RDP 2-Hour Tunnel
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP & Set Secret Password
        run: |
          # 1. Enable Remote Desktop in Windows Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          # 2. Securely set the password from GitHub Secrets
          $PlainTextPassword = "${{ secrets.RDP_PASSWORD }}"
          $SecurePassword = ConvertTo-SecureString $PlainTextPassword -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $SecurePassword
          
          Write-Host "✅ RDP is ready for user: runneradmin" -ForegroundColor Green

      - name: Start InstaTunnel & Hold for 2 Hours
        run: |
          # Install InstaTunnel via npm
          npm install -g instatunnel
          
          # Start the tunnel in the background (Start-Job) 
          # so the script can move to the 'Sleep' command
          Start-Job -ScriptBlock { instatunnel 3389 --tcp }
          
          Write-Host "🚀 Tunnel starting... Check the 'Build' logs above for the address." -ForegroundColor Cyan
          Write-Host "⏳ This session will stay active for 2 hours (7200 seconds)." -ForegroundColor Yellow
          
          # Keep the runner alive for 2 hours
          Start-Sleep -Seconds 7200