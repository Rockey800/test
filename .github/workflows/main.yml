name: 24/7 Movie Streamer

on:
  workflow_dispatch: # Allows you to start it manually
  schedule:
    - cron: '0 */6 * * *' # Restarts every 6 hours (GitHub's max run time)

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Stream
        env:
          MOVIE_URL: ${{ secrets.MOVIE_URL }}
          TELEGRAM_RTMPS: ${{ secrets.TELEGRAM_RTMPS }}
        run: |
          chmod +x stream.sh
          ./stream.sh