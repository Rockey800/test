name: Windows RDP via Localhost.run
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Create RDP User
        env:
          USER_NAME: ${{ secrets.RDP_USER }}
          USER_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          net user "$env:USER_NAME" "$env:USER_PASS" /add
          net localgroup administrators "$env:USER_NAME" /add
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$env:USER_NAME"

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Start Tunnel
        shell: pwsh
        run: |
          Write-Host "Connecting to Tunnel Service..."
          Write-Host "---------------------------------------------------"
          Write-Host "THE ADDRESS WILL APPEAR BELOW (Look for .lhr.life or .proxy.tunnel):"
          Write-Host "---------------------------------------------------"
          
          # We use 'nokey@localhost.run' because it is extremely log-friendly.
          # It prints the URL as a standard string that GitHub captures easily.
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:3389 nokey@localhost.run