name: Windows RDP 2-Hour Tunnel
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP & Set Secret Password
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          $PlainTextPassword = "${{ secrets.RDP_PASSWORD }}"
          $SecurePassword = ConvertTo-SecureString $PlainTextPassword -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $SecurePassword
          Write-Host "✅ RDP Ready for user: runneradmin" -ForegroundColor Green

      - name: Start InstaTunnel & Expose Link
        run: |
          npm install -g instatunnel
          
          Write-Host "⏳ Starting Tunnel and waiting for link..." -ForegroundColor Cyan
          
          # Start the tunnel and pipe the output to a file so we can read it
          Start-Process -FilePath "instatunnel" -ArgumentList "3389 --tcp" -NoNewWindow -RedirectStandardOutput "tunnel_output.txt"
          
          # Wait 15 seconds for the link to be generated by InstaTunnel
          Start-Sleep -Seconds 15
          
          # Read the file and find the TCP link
          $LogContent = Get-Content "tunnel_output.txt" -Raw
          $TcpLink = ($LogContent | Select-String -Pattern "tcp://[a-zA-Z0-9\.:]+").Matches.Value
          
          if ($TcpLink) {
              Write-Host "**********************************************" -ForegroundColor Magenta
              Write-Host "🔗 YOUR RDP LINK: $TcpLink" -ForegroundColor Yellow
              Write-Host "**********************************************" -ForegroundColor Magenta
              
              # This adds the link to the GitHub Actions 'Summary' page for easy copying
              echo "### 🚀 RDP Connection Details" >> $env:GITHUB_STEP_SUMMARY
              echo "- **Address:** \`$TcpLink\`" >> $env:GITHUB_STEP_SUMMARY
              echo "- **Username:** \`runneradmin\`" >> $env:GITHUB_STEP_SUMMARY
              echo "- **Password:** (Set in your Secrets)" >> $env:GITHUB_STEP_SUMMARY
          } else {
              Write-Host "❌ Could not find the link. Printing full log for debugging:" -ForegroundColor Red
              Get-Content "tunnel_output.txt"
          }
          
          Write-Host "⏳ Keeping runner alive for 2 hours..." -ForegroundColor Gray
          Start-Sleep -Seconds 7200