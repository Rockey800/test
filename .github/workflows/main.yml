name: 24/7 GTA V Secure Drive Stream

on:
  schedule:
    - cron: '0 */6 * * *' # Auto-restarts every 6 hours to keep 24/7 uptime
  workflow_dispatch: # Allows you to start it manually for testing

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Streaming Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Start Rockey Gamerz 24/7 Loop
        env:
          # All sensitive data is now pulled from Secrets
          DRIVE_ID: ${{ secrets.DRIVE_FILE_ID }}
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Constructing the Direct Link with the 'confirm' flag to bypass Large File warnings
          # This keeps the ID hidden and pipes data directly to YouTube
          DIRECT_URL="https://docs.google.com/uc?export=download&id=$DRIVE_ID&confirm=t"
          
          echo "Connecting to Secure Drive Source..."
          
          # FFmpeg Settings optimized for GTA V (3500k bitrate for sharp motion)
          ffmpeg -re -stream_loop -1 -i "$DIRECT_URL" \
            -c:v libx264 -preset superfast -b:v 3500k -maxrate 3500k -bufsize 7000k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &
          
          # Wait 5 hours and 50 minutes (21000 seconds)
          sleep 21000 
          
          # Chain the next runner so the stream never dies
          echo "Triggering next 6-hour relay runner..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
          
          echo "Relay successful. Current runner shutting down."