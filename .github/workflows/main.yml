name: Rockey Gamerz Dropbox Stream

on:
  workflow_dispatch: # Manual Start

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6-hour limit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start GTA V Dropbox Loop
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          # Create a Secret named DROPBOX_URL and paste the link ending in &raw=1
          VIDEO_URL: ${{ secrets.DROPBOX_URL }}
        run: |
          echo "🚀 Rockey Gamerz: Streaming GTA V from Dropbox..."

          # -re: Read in real-time
          # -stream_loop -1: Loop the video forever
          # -i "$VIDEO_URL": Your Direct Dropbox Link
          ffmpeg -re -stream_loop -1 -i "$VIDEO_URL" \
            -c:v libx264 -preset superfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"