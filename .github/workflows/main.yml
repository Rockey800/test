name: 24/7 Flame Stream
on:
  schedule:
    - cron: '0 */6 * * *' # Auto-restarts every 6 hours
  workflow_dispatch:      # Allows you to start it manually

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Live Stream
        run: |
          # -re: Stream in real-time speed
          # -stream_loop -1: Loop the MP4 infinitely
          # -c:v libx264: Standard YouTube video codec
          # -c:a copy: Uses the music already inside your MP4 without extra processing
          ffmpeg -re -stream_loop -1 -i fire.mp4 \
          -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 -c:a copy \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"