name: 24/7 Flame Stream

on:
schedule:
- cron: '0 */6 * * *'   # Runs every 6 hours
workflow_dispatch:        # Manual trigger

jobs:
stream:
runs-on: ubuntu-latest
timeout-minutes: 355    # Safety stop before 6h limit (5h 55m)

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Install FFmpeg
    run: |
      sudo apt-get update
      sudo apt-get install -y ffmpeg

  - name: Start Live Stream (1080p)
    run: |
      ffmpeg -re -stream_loop -1 -i fire.mp4 \
      -vf "scale=1920:1080,fps=30" \
      -c:v libx264 -preset veryfast \
      -b:v 5000k -maxrate 5000k -bufsize 10000k \
      -pix_fmt yuv420p -g 60 \
      -c:a aac -b:a 128k \
      -t 18050 \
      -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
