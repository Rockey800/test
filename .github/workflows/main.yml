name: Windows RDP 2-Hour Tunnel
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP & Set Secret Password
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          $PlainTextPassword = "${{ secrets.RDP_PASSWORD }}"
          $SecurePassword = ConvertTo-SecureString $PlainTextPassword -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $SecurePassword
          Write-Host "✅ RDP Ready for user: runneradmin" -ForegroundColor Green

      - name: Start InstaTunnel & Expose Link
        shell: pwsh
        run: |
          npm install -g instatunnel
          
          Write-Host "⏳ Starting TCP Tunnel..." -ForegroundColor Cyan
          
          # NEW SYNTAX: 'instatunnel tcp [port]'
          # We use Start-Job to keep it running in the background
          Start-Job -ScriptBlock { instatunnel tcp 3389 > tunnel.log 2>&1 }
          
          # Wait for the link to generate
          Start-Sleep -Seconds 20
          
          if (Test-Path "tunnel.log") {
              $LogContent = Get-Content "tunnel.log" -Raw
              
              # Look for the TCP link in the logs
              if ($LogContent -match "tcp://[a-zA-Z0-9\.:]+") {
                  $TcpLink = $matches[0]
                  Write-Host "**********************************************" -ForegroundColor Magenta
                  Write-Host "🔗 YOUR RDP LINK: $TcpLink" -ForegroundColor Yellow
                  Write-Host "**********************************************" -ForegroundColor Magenta
                  
                  # Add to GitHub Summary for easy copy-paste
                  echo "### 🚀 RDP Connection Details" >> $env:GITHUB_STEP_SUMMARY
                  echo "- **Address:** \`$TcpLink\`" >> $env:GITHUB_STEP_SUMMARY
                  echo "- **Username:** \`runneradmin\`" >> $env:GITHUB_STEP_SUMMARY
              } else {
                  Write-Host "⚠️ Link not found yet. Full log output below:" -ForegroundColor Yellow
                  Write-Host $LogContent
              }
          }
          
          Write-Host "⏳ Keeping runner alive for 2 hours..."
          Start-Sleep -Seconds 7200