name: Windows RDP via Serveo
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configure Windows User
        env:
          USER_NAME: ${{ secrets.RDP_USER }}
          USER_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          net user "$env:USER_NAME" "$env:USER_PASS" /add
          net localgroup administrators "$env:USER_NAME" /add
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$env:USER_NAME"
          Write-Host "User setup complete."

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Start Serveo Tunnel
        shell: pwsh
        run: |
          Write-Host "Connecting to Serveo..."
          Write-Host "---------------------------------------------------"
          Write-Host "LOOK FOR THE 'Forwarding HTTP traffic from...' LINE BELOW"
          Write-Host "Use the URL provided (e.g., serveo.net:12345)"
          Write-Host "---------------------------------------------------"
          
          # -R 0:localhost:3389 asks Serveo to assign a random public port to your RDP
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 0:localhost:3389 serveo.net