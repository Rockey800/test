name: 24/7 GTA V Stream

on:
  schedule:
    - cron: '0 */6 * * *' # Auto-restart every 6 hours
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp

      - name: Start 24/7 Loop
        env:
          VIDEO_URL: "https://youtu.be/WOgAp9Hj5lg"
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Get the direct streaming link from the URL
          DIRECT_URL=$(yt-dlp -g "$VIDEO_URL")
          
          # Push to YouTube. We use -stream_loop -1 to repeat the 38m video.
          ffmpeg -re -stream_loop -1 -i "$DIRECT_URL" \
            -c:v libx264 -preset superfast -b:v 3500k -maxrate 3500k -bufsize 7000k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &
          
          # Wait 5h 50m
          sleep 21000 
          
          # Trigger the next runner
          curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'