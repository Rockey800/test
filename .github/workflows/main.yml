name: Rockey Gamerz Manual Stream

on:
  workflow_dispatch:        # Manual Start Button Only

jobs:
  stream:
    runs-on: ubuntu-latest
    # GitHub Runners have a 6-hour hard limit. 
    # We set this to 360 minutes to maximize your session.
    timeout-minutes: 360    

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Streaming Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start 6-Video mp4 Sequence
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          echo "🚀 Rockey Gamerz: Initializing Manual 6-Hour Session"

          # 1. Create the playlist file
          # Ensure files are named fire1.mp4 to fire6.mp4 in your repo
          echo "file 'fire1.mp4'" > list.txt
          echo "file 'fire2.mp4'" >> list.txt
          echo "file 'fire3.mp4'" >> list.txt
          echo "file 'fire4.mp4'" >> list.txt
          echo "file 'fire5.mp4'" >> list.txt
          echo "file 'fire6.mp4'" >> list.txt

          # 2. Start FFmpeg
          # We removed the '&' so the runner stays active until the 6 hours are up.
          # -stream_loop -1: Keeps the 6 videos looping until GitHub stops the runner.
          ffmpeg -re -f concat -safe 0 -stream_loop -1 -i list.txt \
            -c:v libx264 -preset superfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

          echo "🏁 6-hour session complete."